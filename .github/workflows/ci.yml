name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.2"
            laravel: "12"
            testbench: "^10.0"
            pest: "^3.0"
            pest_plugin: "^3.0"
          - php: "8.3"
            laravel: "12"
            testbench: "^10.0"
            pest: "^3.0"
            pest_plugin: "^3.0"
          - php: "8.3"
            laravel: "13"
            testbench: "^11.0"
            pest: "^4.0"
            pest_plugin: "^4.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Configure matrix dependency stack
        run: |
          composer require --dev --no-interaction --no-update \
            "orchestra/testbench:${{ matrix.testbench }}" \
            "pestphp/pest:${{ matrix.pest }}" \
            "pestphp/pest-plugin-laravel:${{ matrix.pest_plugin }}"

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: composer test
